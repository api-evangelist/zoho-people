apiVersion: naftiko.io/v1
kind: CapabilityWorkflow
metadata:
  name: employee-onboarding
  provider: Zoho People
  description: >-
    Onboard a new hire end-to-end inside Zoho People — create the employee,
    register opening-day attendance, assign default leave balances, and
    kick off the HR automation workflow.
spec:
  inputs:
    - name: firstName
      type: string
    - name: lastName
      type: string
    - name: email
      type: string
    - name: department
      type: string
    - name: designation
      type: string
    - name: startDate
      type: string
      format: date
  steps:
    - id: create-employee
      capability: zoho-people:create-employee
      args:
        FirstName: ${inputs.firstName}
        LastName: ${inputs.lastName}
        EmailID: ${inputs.email}
        Department: ${inputs.department}
        Designation: ${inputs.designation}
        DateofJoining: ${inputs.startDate}
        EmployeeStatus: Active
        EmploymentType: Permanent
    - id: confirm-leave-types
      capability: zoho-people:list-leave-types
      args: { userId: ${steps.create-employee.result.EmployeeID} }
    - id: trigger-onboarding-workflow
      capability: zoho-people:trigger-workflow
      args:
        workflowId: WF_ONBOARD_NEW_HIRE
        inputData: { employeeId: ${steps.create-employee.result.EmployeeID} }
  outputs:
    employeeId: ${steps.create-employee.result.EmployeeID}
    workflowRunId: ${steps.trigger-onboarding-workflow.result.runId}
