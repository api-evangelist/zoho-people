    name: Zoho People REST API
    description: >-
      OAuth 2.0 protected REST API for Zoho People HRMS, exposing employee records, custom forms, leave, attendance,
      time-tracker, automation, and dashboard data. Requests and responses are XML or JSON, secured with Zoho Accounts
      OAuth 2.0 authorization-code tokens scoped under the `ZOHOPEOPLE` service namespace.
