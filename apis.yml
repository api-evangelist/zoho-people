aid: zoho-people
name: Zoho People
description: >-
  Zoho People is Zoho's cloud-based, AI-first HR management system (HRMS) spanning core HR, time and attendance, leave,
  performance, learning, recruitment, payroll and analytics — bundled inside the Zoho One business suite. The Zoho
  People REST API exposes employee records, custom forms, leave, attendance, time tracking, automation, and dashboard
  data in XML or JSON, secured with Zoho OAuth 2.0 via the Zoho Accounts service and the seven `ZOHOPEOPLE` scopes
  (employee, forms, dashboard, automation, timetracker, attendance, leave).
